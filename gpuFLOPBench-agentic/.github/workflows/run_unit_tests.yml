name: Run Unit Tests

on:
  push:
    branches:
      - main
      - codex-help

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    env:
      CODEX_ROOT: ${{ github.workspace }}
      GIT_LFS_SKIP_SMUDGE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y wget make git gfortran libomp-20-dev libboost-all-dev clang-20 clang-tools-20 unzip imagemagick vim git-lfs npm openssh-client openssh-server

      - name: Configure clang alternatives
        run: |
          set -euxo pipefail
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          sudo update-alternatives --install /usr/bin/llvm-cxxfilt llvm-cxxfilt /usr/bin/llvm-cxxfilt-20 100

      - name: Install Miniconda
        run: |
          set -euxo pipefail
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash ./Miniconda3-latest-Linux-x86_64.sh -b -p ~/anaconda3
          rm ./Miniconda3-latest-Linux-x86_64.sh

      - name: Create Conda environment and install Python deps
        shell: bash
        run: |
          set -euxo pipefail
          source ~/anaconda3/bin/activate
          conda init --all
          conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main
          conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r
          conda create --name codex-env python=3.11.11 -y
          conda activate codex-env
          conda install --channel conda-forge -y pygraphviz
          # should change this to a requirements.txt file later with pip frozen package numbers
          pip install --upgrade pip setuptools wheel
          pip install jupyterlab notebook ipywidgets matplotlib pandas scikit-learn scipy seaborn langgraph langchain
          pip install langchain_core langchain-azure-ai langchain-mcp-adapters fastmcp pytest tree-sitter tree-sitter-cuda

      - name: Run check_code_search_tools unit test
        shell: bash
        run: |
          set -euxo pipefail
          source ~/anaconda3/bin/activate
          conda activate codex-env
          python -m pytest -vv -s ./unit-tests/check_code_search_tools.py
          python -m pytest -vv -s ./unit-tests/test_cuda_kernel_uniqueness.py

      - name: Install codex-1up package 
        shell: bash
        run: |
          set -euxo pipefail
          source ~/anaconda3/bin/activate
          conda activate codex-env
          npx -y codex-1up install

